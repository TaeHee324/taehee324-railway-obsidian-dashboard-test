<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 대시보드</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:       #4A6FA5;
  --blue-light: #EBF0F8;
  --blue-mid:   #C5D4E8;
  --gray:       #6B7A8D;
  --gray-light: #F2F4F7;
  --border:     #D8DFE8;
  --text:       #1C2433;
  --subtext:    #7A8799;
  --done:       #B0BBC8;
  --radius:     6px;
  --sidebar-w:  220px;
  --green:      #2E7D32;
  --green-light:#EBF5EB;
  --green-mid:  #A5D6A7;
}

body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F2F4F7; color: var(--text); min-height: 100vh; }

/* ── 레이아웃 ── */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  background: #1C2433;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 24px 0 16px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 10;
}

.sidebar-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #fff;
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 8px;
}
.sidebar-logo span { color: var(--blue-mid); }

.sidebar-section {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 12px 20px 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.sidebar-item.active { background: rgba(74,111,165,0.25); color: #fff; border-left-color: var(--blue); }
.sidebar-item svg { opacity: 0.7; flex-shrink: 0; }
.sidebar-item.active svg { opacity: 1; }

.sidebar-footer {
  margin-top: auto;
  padding: 12px 20px 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-footer button {
  width: 100%;
  padding: 7px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius);
  color: rgba(255,255,255,0.5);
  font-size: 11.5px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s;
}
.sidebar-footer button:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

.main { margin-left: var(--sidebar-w); flex: 1; padding: 36px 40px 60px; max-width: 960px; }

/* ── 공통 ── */
.page-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 4px;
}
.page-sub { font-size: 12.5px; color: var(--subtext); margin-bottom: 28px; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--subtext);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin: 28px 0 14px;
}

.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ── 스탯 카드 ── */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.stat-card {
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: center;
}
.stat-num { font-size: 30px; font-weight: 700; color: var(--blue); line-height: 1; margin-bottom: 5px; }
.stat-label { font-size: 11px; color: var(--subtext); letter-spacing: 0.05em; }

/* ── 태스크 ── */
.task-group-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--subtext);
  margin: 16px 0 6px;
}
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 4px 0;
  font-size: 13px;

}
.task-item.done { color: var(--done); text-decoration: line-through; }
.check-box {
  width: 15px; height: 15px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
}
.check-box.checked { background: var(--blue); border-color: var(--blue); }
.check-box.checked::after {
  content: '';
  display: block;
  width: 8px; height: 5px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}

/* ── 네비 그리드 ── */
.nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.nav-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.nav-card-title {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--subtext);
  margin-bottom: 10px;
}
.nav-card ul { list-style: none; }
.nav-card ul li { padding: 3px 0; font-size: 12.5px; color: var(--blue); }

/* ── 테이블 ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead th {
  font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--subtext);
  border-bottom: 2px solid var(--border);
  padding: 7px 12px; text-align: left;
}
.data-table tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tbody tr:hover td { background: var(--gray-light); }
.data-table tbody tr:last-child td { border-bottom: none; }

/* ── 배지 ── */
.badge {
  display: inline-block;
  border-radius: 99px;
  font-size: 10.5px;
  font-weight: 600;
  padding: 2px 9px;
  background: var(--blue-light);
  color: var(--blue);
  border: 1px solid var(--blue-mid);
  white-space: nowrap;
}
.badge.gray { background: var(--gray-light); color: var(--gray); border-color: var(--border); }
.badge.green { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }

/* ── 태그 클라우드 ── */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: var(--gray-light); border: 1px solid var(--border); border-radius: 99px; font-size: 12px; padding: 3px 10px; color: var(--text); }
.tag.tool { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue); }

/* ── 프로필 헤더 ── */
.profile-header { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 4px; }
.profile-photo {
  width: 100px; height: 128px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  object-fit: cover; object-position: top center;
  flex-shrink: 0;
}
.profile-photo-placeholder {
  width: 100px; height: 128px;
  border-radius: var(--radius);
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 700; color: var(--blue);
  flex-shrink: 0;
}
.profile-name-main { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3px; }
.profile-name-sub { font-size: 12px; color: var(--subtext); margin-bottom: 12px; }
.profile-meta { display: flex; flex-direction: column; gap: 5px; }
.profile-meta-row { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--gray); }
.profile-meta-row a { color: var(--blue); text-decoration: none; }

/* ── 역량 넘버 ── */
.strength-list { display: flex; flex-direction: column; gap: 12px; }
.strength-item { display: flex; gap: 12px; }
.strength-num {
  font-size: 11px; font-weight: 700; color: var(--blue);
  background: var(--blue-light); border: 1px solid var(--blue-mid);
  border-radius: 4px; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.strength-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.strength-desc { font-size: 12px; color: var(--subtext); line-height: 1.55; }

/* ── 타임라인 ── */
.timeline { padding-left: 18px; position: relative; }
.timeline::before { content:''; position:absolute; left:5px; top:8px; bottom:8px; width:1px; background:var(--border); }
.tl-item { display:flex; gap:14px; padding-bottom:16px; position:relative; }
.tl-item:last-child { padding-bottom:0; }
.tl-dot { position:absolute; left:-13px; top:5px; width:8px; height:8px; border-radius:50%; background:var(--blue); border:2px solid #F2F4F7; box-shadow:0 0 0 1px var(--blue-mid); }
.tl-dot.current { background:#2a9d8f; box-shadow:0 0 0 1px #a8d8d4; }
.tl-period { font-size:10.5px; font-weight:600; color:var(--blue); min-width:110px; padding-top:1px; white-space:nowrap; }
.tl-period.current { color:#2a9d8f; }
.tl-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.tl-desc { font-size:12px; color:var(--subtext); line-height:1.55; }

/* ── 수상 ── */
.award-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.award-item:last-child { border-bottom:none; }
.award-icon { width:32px; height:32px; background:#FFF7E6; border:1px solid #F5D78E; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.award-name { font-size:13px; font-weight:600; margin-bottom:2px; }
.award-meta { font-size:11px; color:var(--subtext); }

/* ── 아카이브 카드 ── */
.archive-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.archive-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
.archive-card-title { font-size:13.5px; font-weight:600; margin-bottom:6px; }
.archive-card-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.archive-card-result { font-size:12px; color:var(--subtext); line-height:1.5; }

/* ── 차트 컨테이너 ── */
.chart-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:20px; }

/* ── 설정 화면 ── */
.setup-overlay {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #F2F4F7;
}
.setup-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 40px;
  width: 480px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}
.setup-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.setup-sub { font-size: 13px; color: var(--subtext); margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.form-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text);
  background: var(--gray-light);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--blue); background: #fff; }
.form-hint { font-size: 11px; color: var(--subtext); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-primary {
  width: 100%;
  padding: 11px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.btn-primary:hover { background: #3a5f95; }
.btn-primary:disabled { background: var(--blue-mid); cursor: not-allowed; }

/* ── 로딩 ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--subtext); gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { background: #FFF5F5; border: 1px solid #FFC5C5; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: #C0392B; margin: 12px 0; }

/* ── 두 열 ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.inner-card { background: var(--gray-light); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.inner-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--subtext); margin-bottom: 12px; }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════
   GitHub API
══════════════════════════════════════ */
function makeGH(cfg) {
  const { owner, repo, branch = 'main', token, vaultPath = '' } = cfg;
  const headers = token ? { Authorization: `token ${token}` } : {};

  function resolvePath(p) {
    return vaultPath ? `${vaultPath}/${p}` : p;
  }

  async function apiGet(path) {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}?ref=${branch}`;
    const r = await fetch(url, { headers });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.message || `GitHub ${r.status}`);
    }
    return r.json();
  }

  function b64decode(str) {
    const bytes = Uint8Array.from(atob(str.replace(/\n/g, '')), c => c.charCodeAt(0));
    return new TextDecoder('utf-8').decode(bytes);
  }

  return {
    async getFile(p) {
      const d = await apiGet(resolvePath(p));
      if (Array.isArray(d)) throw new Error('Path is a directory');
      return b64decode(d.content);
    },
    async getDir(p) {
      const d = await apiGet(resolvePath(p));
      return Array.isArray(d) ? d : [];
    }
  };
}

/* ══════════════════════════════════════
   파싱 유틸리티
══════════════════════════════════════ */
function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!m) return { meta: {}, body: text };
  try {
    return { meta: jsyaml.load(m[1]) || {}, body: text.slice(m[0].length).trim() };
  } catch {
    return { meta: {}, body: text };
  }
}

function parseTasks(md) {
  // 탭으로 들여쓰기된 할 일 목록 파싱
  const lines = md.split('\n');
  const groups = [];
  let currentGroup = null;
  let inTodo = false;

  for (const line of lines) {
    const tabs = (line.match(/^\t+/) || [''])[0].length;
    const stripped = line.replace(/^\t*/, '').replace(/^-\s*/, '');

    // "할 일" 섹션 진입
    if (!inTodo && line.match(/^-\s+할 일/)) { inTodo = true; continue; }
    // 다른 최상위 항목이면 종료
    if (inTodo && tabs === 0 && line.startsWith('- ')) { inTodo = false; }
    if (!inTodo) continue;

    const taskM = stripped.match(/^\[([x ])\]\s+(.+)/);
    if (tabs === 1 && !taskM) {
      currentGroup = { name: stripped.trim(), tasks: [] };
      groups.push(currentGroup);
    } else if (taskM && currentGroup) {
      currentGroup.tasks.push({ done: taskM[1] === 'x', text: taskM[2].trim() });
    }
  }
  return groups;
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return String(d); }
}

/* ══════════════════════════════════════
   설정 화면
══════════════════════════════════════ */
function SetupScreen({ onSave }) {
  const [form, setForm] = useState({ owner:'', repo:'', branch:'main', token:'', vaultPath:'' });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }

  async function handleSave() {
    if (!form.owner || !form.repo) { setErr('GitHub 사용자명과 저장소는 필수입니다.'); return; }
    setLoading(true); setErr('');
    try {
      const gh = makeGH(form);
      await gh.getDir(''); // 연결 테스트
      localStorage.setItem('dashboard_config', JSON.stringify(form));
      onSave(form);
    } catch (e) {
      setErr(`연결 실패: ${e.message} — 토큰과 저장소명을 확인해주세요.`);
    }
    setLoading(false);
  }

  return (
    <div className="setup-overlay">
      <div className="setup-card">
        <div className="setup-title">대시보드 설정</div>
        <div className="setup-sub">GitHub 저장소 정보를 입력하면 Obsidian 볼트를 읽어 대시보드를 자동 생성합니다.</div>

        <div className="form-row">
          <div className="form-group">
            <label className="form-label">GitHub 사용자명</label>
            <input className="form-input" placeholder="username" value={form.owner} onChange={e => set('owner', e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">저장소 이름</label>
            <input className="form-input" placeholder="my-vault" value={form.repo} onChange={e => set('repo', e.target.value)} />
          </div>
        </div>

        <div className="form-row">
          <div className="form-group">
            <label className="form-label">브랜치</label>
            <input className="form-input" placeholder="main" value={form.branch} onChange={e => set('branch', e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">볼트 기본 경로 <span style={{fontWeight:400}}>(선택)</span></label>
            <input className="form-input" placeholder="Note" value={form.vaultPath} onChange={e => set('vaultPath', e.target.value)} />
            <div className="form-hint">볼트가 하위 폴더에 있으면 입력. 루트면 비워두세요.</div>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Personal Access Token <span style={{fontWeight:400}}>(비공개 저장소)</span></label>
          <input className="form-input" type="password" placeholder="ghp_..." value={form.token} onChange={e => set('token', e.target.value)} />
          <div className="form-hint">Settings → Developer settings → Personal access tokens → Tokens (classic) → repo 권한 체크</div>
        </div>

        {err && <div className="error-box">{err}</div>}
        <button className="btn-primary" onClick={handleSave} disabled={loading}>
          {loading ? '연결 중...' : '저장하고 시작하기'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   사이드바
══════════════════════════════════════ */
const NAV = [
  { id:'home',    icon: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>, label:'홈' },

/* ══════════════════════════════════════
   홈 페이지
══════════════════════════════════════ */
function HomePage({ gh }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState('');

  useEffect(() => {
    async function load() {
      try {
        const [homeMd, archiveDir, coverDir, jdDir] = await Promise.all([
          gh.getFile('00.HOME.md').catch(() => ''),
          gh.getDir('archive').catch(() => []),
          gh.getDir('coverletter').catch(() => []),
          gh.getDir('raw/jd').catch(() => []),
        ]);

        const taskGroups = parseTasks(homeMd);
        const archiveCount = archiveDir.filter(f => f.type==='file' && !['index.md','log.md','_template.md'].includes(f.name)).length;
        const coverCount = coverDir.filter(f => f.type==='file').length;
        const jdCount = jdDir.filter(f => f.type==='file').length;

        setData({ taskGroups, archiveCount, coverCount, jdCount });
      } catch (e) { setErr(e.message); }
    }
    load();
  }, []);

  if (err) return <div className="error-box">홈 로딩 오류: {err}</div>;
  if (!data) return <div className="loading"><div className="spinner"></div>불러오는 중...</div>;

  const pending = data.taskGroups.flatMap(g => g.tasks.filter(t => !t.done)).length;
  const done = data.taskGroups.flatMap(g => g.tasks).length - pending;

  return (
    <div>
      <div className="page-title">취업 준비 대시보드</div>
      <div className="page-sub">자기계발 · 경험 아카이브 · 취업 준비</div>

      <div className="section-label">현황 요약</div>
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-num">{data.archiveCount}</div>
          <div className="stat-label">경험 아카이브</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{data.coverCount}</div>
          <div className="stat-label">자소서 작성</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{data.jdCount}</div>
          <div className="stat-label">수집 채용공고</div>
        </div>
      </div>

      <div className="section-label">진행 중인 태스크 <span style={{fontWeight:400, color:'var(--subtext)'}}>— 완료 {done} / 미완료 {pending}</span></div>
      <div className="card">
        {data.taskGroups.length === 0 && <div style={{color:'var(--subtext)', fontSize:13}}>00.HOME.md에서 태스크를 불러올 수 없었습니다.</div>}
        {data.taskGroups.map((g, i) => (
          <div key={i}>
            <div className="task-group-label" style={{marginTop: i===0?0:undefined}}>{g.name}</div>
            {g.tasks.map((t, j) => (
              <div key={j} className={`task-item${t.done?' done':''}`}>
                <div className={`check-box${t.done?' checked':''}`}></div>
                <span>{t.text}</span>
              </div>
            ))}
          </div>
        ))}
      </div>

      <div className="section-label">네비게이션</div>
      <div className="nav-grid">
        {[
          { title:'AGENDA', items:['자소서 폴더','작업 로그'] },
          { title:'경험 아카이브', items:['아카이브 목차','나의 프로필','경험 템플릿'] },
          { title:'채용 자료', items:['채용공고 폴더','활동 파일','운영 규칙'] },
          { title:'성장 도구', items:['만다라트','월간 노트','주간 노트'] },
        ].map((c, i) => (
          <div key={i} className="nav-card">
            <div className="nav-card-title">{c.title}</div>
            <ul>{c.items.map((item, j) => <li key={j}>{item}</li>)}</ul>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   경험 아카이브 페이지
══════════════════════════════════════ */
function ArchivePage({ gh }) {
  const [items, setItems] = useState(null);
  const [err, setErr] = useState('');
  const [filter, setFilter] = useState('전체');

  useEffect(() => {
    async function load() {
      try {
        const files = await gh.getDir('archive');
        const mdFiles = files.filter(f => f.type==='file' && f.name.endsWith('.md') && !['index.md','log.md','_template.md'].includes(f.name));
        const parsed = await Promise.all(mdFiles.map(async f => {
          try {
            const text = await gh.getFile(`archive/${f.name}`);
            const { meta } = parseFrontmatter(text);
            return { ...meta, _file: f.name };
          } catch { return { _file: f.name }; }
        }));
        setItems(parsed.sort((a, b) => (b.date||'') > (a.date||'') ? 1 : -1));
      } catch (e) { setErr(e.message); }
    }
    load();
  }, []);

  if (err) return <div className="error-box">아카이브 로딩 오류: {err}</div>;
  if (!items) return <div className="loading"><div className="spinner"></div>불러오는 중...</div>;

  const types = ['전체', ...new Set(items.map(i => i.type).filter(Boolean))];
  const filtered = filter==='전체' ? items : items.filter(i => i.type === filter);

  return (
    <div>
      <div className="page-title">경험 아카이브</div>
      <div className="page-sub">총 {items.length}개의 경험이 기록되어 있습니다</div>

      <div style={{display:'flex', gap:8, marginBottom:20}}>
        {types.map(t => (
          <button key={t} onClick={() => setFilter(t)} style={{
            padding:'5px 14px', borderRadius:99, fontSize:12, fontWeight:600, cursor:'pointer',
            background: filter===t ? 'var(--blue)' : '#fff',
            color: filter===t ? '#fff' : 'var(--subtext)',
            border: `1px solid ${filter===t ? 'var(--blue)' : 'var(--border)'}`,
          }}>{t}</button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div style={{color:'var(--subtext)', fontSize:13}}>표시할 항목이 없습니다.</div>
      ) : (
        <div className="archive-grid">
          {filtered.map((item, i) => (
            <div key={i} className="archive-card">
              <div className="archive-card-meta">
                {item.type && <span className="badge gray">{item.type}</span>}
                {item.date && <span style={{fontSize:11, color:'var(--subtext)'}}>{formatDate(item.date)}</span>}
              </div>
              <div className="archive-card-title">{item.title || item._file.replace('.md','')}</div>
              {item.organization && <div style={{fontSize:12, color:'var(--subtext)', marginBottom:6}}>{item.organization}</div>}
              {item.star_result && <div className="archive-card-result">⭐ {item.star_result}</div>}
              {item.strength && (
                <div style={{marginTop:8, display:'flex', flexWrap:'wrap', gap:4}}>
                  {(Array.isArray(item.strength) ? item.strength : [item.strength]).map((s, j) => (
                    <span key={j} className="badge" style={{fontSize:10}}>{s}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   역량 분포 페이지
══════════════════════════════════════ */
function SkillsPage({ gh }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState('');
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    async function load() {
      try {
        const [profileText, archiveFiles] = await Promise.all([
          gh.getFile('profile/profile.md').catch(() => ''),
          gh.getDir('archive').catch(() => []),
        ]);

        const { meta: profile } = parseFrontmatter(profileText);

        // 역량별 경험수 집계
        const strengthCount = {};
        const mdFiles = archiveFiles.filter(f => f.type==='file' && f.name.endsWith('.md') && !['index.md','log.md','_template.md'].includes(f.name));
        await Promise.all(mdFiles.map(async f => {
          try {
            const text = await gh.getFile(`archive/${f.name}`);
            const { meta } = parseFrontmatter(text);
            const strengths = Array.isArray(meta.strength) ? meta.strength : meta.strength ? [meta.strength] : [];
            strengths.forEach(s => { strengthCount[s] = (strengthCount[s]||0) + 1; });
          } catch {}
        }));

        const sorted = Object.entries(strengthCount).sort((a,b) => b[1]-a[1]);
        setData({ profile, strengthChart: sorted });
      } catch (e) { setErr(e.message); }
    }
    load();
  }, []);

  useEffect(() => {
    if (!data || !chartRef.current || data.strengthChart.length === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();

    const labels = data.strengthChart.map(([k]) => k);
    const values = data.strengthChart.map(([,v]) => v);

    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: 'rgba(74,111,165,0.7)',
          borderColor: '#4A6FA5',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { stepSize: 1 }, grid: { color: '#F2F4F7' } },
          y: { ticks: { font: { size: 12 } }, grid: { display: false } }
        }
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [data]);

  if (err) return <div className="error-box">역량 데이터 오류: {err}</div>;
  if (!data) return <div className="loading"><div className="spinner"></div>불러오는 중...</div>;

  const m = data.profile;

  return (
    <div>
      <div className="page-title">역량 분포</div>
      <div className="page-sub">경험 아카이브 기반 역량 분석</div>

      {data.strengthChart.length > 0 ? (
        <>
          <div className="section-label">역량별 경험 수</div>
          <div className="chart-wrap">
            <canvas ref={chartRef}></canvas>
          </div>
        </>
      ) : (
        <div style={{color:'var(--subtext)', fontSize:13}}>archive/ 폴더의 파일에 strength 필드를 추가하면 차트가 표시됩니다.</div>
      )}

      {m.skills && <>
        <div className="section-label">도메인 스킬</div>
        <div className="two-col">
          {m.skills.domains?.length > 0 && (
            <div className="inner-card">
              <div className="inner-card-title">도메인 역량</div>
              <div className="tag-cloud">{m.skills.domains.map((d, i) => <span key={i} className="tag">{d}</span>)}</div>
            </div>
          )}
          {m.skills.tools?.length > 0 && (
            <div className="inner-card">
              <div className="inner-card-title">툴 & 기술</div>
              <div className="tag-cloud">{m.skills.tools.map((t, i) => <span key={i} className="tag tool">{t}</span>)}</div>
            </div>
          )}
        </div>
      </>}
    </div>
  );
}

/* ══════════════════════════════════════
   앱 루트
══════════════════════════════════════ */
function App() {
  const [config, setConfig] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dashboard_config') || 'null'); } catch { return null; }
  });
  const [page, setPage] = useState('home');

  const gh = config ? makeGH(config) : null;

  function handleReset() {
    localStorage.removeItem('dashboard_config');
    setConfig(null);
  }

  if (!config) return <SetupScreen onSave={setConfig} />;

  const pageEl = {
    home:    <HomePage gh={gh} />,
    profile: <ProfilePage gh={gh} />,
    archive: <ArchivePage gh={gh} />,
    skills:  <SkillsPage gh={gh} />,
  }[page];

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} onReset={handleReset} config={config} />
      <div className="main">{pageEl}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
